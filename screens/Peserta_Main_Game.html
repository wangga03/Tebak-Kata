<script>
        // Simple micro-interaction for letter selection
        const letters = document.querySelectorAll('#letter-pool button');
        const slots = document.querySelectorAll('#answer-grid div');
        let currentSlot = 0;

        letters.forEach(btn => {
            btn.addEventListener('click', () => {
                if (currentSlot < slots.length) {
                    const letter = btn.innerText;
                    slots[currentSlot].innerText = letter;
                    slots[currentSlot].classList.add('bg-white', 'border-primary', 'shadow-md');
                    slots[currentSlot].classList.remove('bg-surface-container-low', 'shadow-inner');
                    
                    // Temporary disable used letter
                    btn.style.opacity = '0.3';
                    btn.style.pointerEvents = 'none';
                    
                    currentSlot++;
                }
            });
        });

        // Reset functionality on slot click
        slots.forEach((slot, index) => {
            slot.addEventListener('click', () => {
                if (slot.innerText !== "") {
                    const letterToRestore = slot.innerText;
                    letters.forEach(btn => {
                        if (btn.innerText === letterToRestore && btn.style.opacity === '0.3') {
                            btn.style.opacity = '1';
                            btn.style.pointerEvents = 'auto';
                        }
                    });
                    
                    slot.innerText = "";
                    slot.classList.remove('bg-white', 'border-primary', 'shadow-md');
                    slot.classList.add('bg-surface-container-low', 'shadow-inner');
                    
                    // Move current slot pointer back if needed
                    if (index < currentSlot) {
                        currentSlot = index;
                    }
                }
            });
        });
    </script>
