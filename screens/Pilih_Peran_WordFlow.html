<!DOCTYPE html>

<html lang="id"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>WordFlow - Pilih Peran</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "tertiary-container": "#bf2076",
                    "inverse-on-surface": "#eff1f3",
                    "on-surface-variant": "#4a4455",
                    "surface-bright": "#f7f9fb",
                    "tertiary-fixed": "#ffd9e4",
                    "on-tertiary-fixed-variant": "#8c0053",
                    "outline-variant": "#ccc3d8",
                    "primary-fixed": "#eaddff",
                    "on-surface": "#191c1e",
                    "surface-container-lowest": "#ffffff",
                    "secondary": "#735c00",
                    "on-primary-fixed-variant": "#5a00c6",
                    "secondary-fixed": "#ffe083",
                    "secondary-container": "#fed01b",
                    "error-container": "#ffdad6",
                    "surface": "#f7f9fb",
                    "surface-container-high": "#e6e8ea",
                    "on-error-container": "#93000a",
                    "secondary-fixed-dim": "#eec200",
                    "on-error": "#ffffff",
                    "on-tertiary-container": "#ffdde7",
                    "on-secondary-fixed": "#231b00",
                    "on-primary-fixed": "#25005a",
                    "inverse-primary": "#d2bbff",
                    "surface-dim": "#d8dadc",
                    "tertiary": "#9b005c",
                    "outline": "#7b7487",
                    "inverse-surface": "#2d3133",
                    "surface-container": "#eceef0",
                    "on-secondary-container": "#6f5900",
                    "on-primary": "#ffffff",
                    "surface-container-low": "#f2f4f6",
                    "primary-fixed-dim": "#d2bbff",
                    "on-secondary-fixed-variant": "#574500",
                    "on-background": "#191c1e",
                    "background": "#f7f9fb",
                    "surface-variant": "#e0e3e5",
                    "surface-tint": "#732ee4",
                    "on-secondary": "#ffffff",
                    "tertiary-fixed-dim": "#ffb0cd",
                    "surface-container-highest": "#e0e3e5",
                    "on-tertiary-fixed": "#3e0022",
                    "primary": "#630ed4",
                    "on-tertiary": "#ffffff",
                    "error": "#ba1a1a",
                    "primary-container": "#7c3aed",
                    "on-primary-container": "#ede0ff"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {
                    "gutter": "12px",
                    "tile-gap": "8px",
                    "margin-mobile": "16px",
                    "margin-desktop": "32px",
                    "base-unit": "4px"
            },
            "fontFamily": {
                    "headline-xl": ["Plus Jakarta Sans"],
                    "body-md": ["Plus Jakarta Sans"],
                    "tile-text": ["Plus Jakarta Sans"],
                    "headline-lg": ["Plus Jakarta Sans"],
                    "label-sm": ["Plus Jakarta Sans"],
                    "label-bold": ["Plus Jakarta Sans"],
                    "headline-lg-mobile": ["Plus Jakarta Sans"]
            },
            "fontSize": {
                    "headline-xl": ["40px", {"lineHeight": "48px", "letterSpacing": "-0.02em", "fontWeight": "800"}],
                    "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "500"}],
                    "tile-text": ["24px", {"lineHeight": "32px", "fontWeight": "700"}],
                    "headline-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "800"}],
                    "label-sm": ["12px", {"lineHeight": "16px", "fontWeight": "600"}],
                    "label-bold": ["14px", {"lineHeight": "20px", "fontWeight": "700"}],
                    "headline-lg-mobile": ["28px", {"lineHeight": "34px", "fontWeight": "800"}]
            }
          },
        },
      }

<style>
        body {
            background-color: #f7f9fb;
            font-family: 'Plus Jakarta Sans', sans-serif;
            color: #191c1e;
            overflow-x: hidden;
        }

        .role-card {
            transition: all 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
            border-bottom: 4px solid rgba(0,0,0,0.1);
        }

        .role-card:active {
            transform: scale(0.96) translateY(2px);
            border-bottom-width: 0px;
        }

        .glass-effect {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        .floating-anim {
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        .primary-glow {
            box-shadow: 0 0 20px rgba(124, 58, 237, 0.2);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="flex flex-col min-h-screen items-center">
<!-- Top AppBar (from JSON) -->
<header class="fixed top-0 left-0 w-full z-50 bg-surface border-b border-surface-variant shadow-sm">
<div class="flex justify-between items-center px-margin-mobile py-3 max-w-[480px] mx-auto">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary" data-icon="menu">menu</span>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-primary tracking-tight">WordFlow</h1>
</div>
<span class="material-symbols-outlined text-primary" data-icon="account_circle">account_circle</span>
</div>
</header>
<main class="flex-1 w-full max-w-[480px] px-margin-mobile pt-24 pb-32 flex flex-col items-center">
<!-- Welcome Section -->
<div class="w-full text-center mb-10 space-y-2">
<div class="inline-block p-4 rounded-full bg-primary-fixed mb-4 floating-anim">
<span class="material-symbols-outlined text-primary text-5xl" style="font-variation-settings: 'FILL' 1;">auto_awesome</span>
</div>
<h2 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface">Selamat Datang di WordFlow</h2>
<p class="font-body-md text-body-md text-on-surface-variant">Pilih peran Anda untuk memulai pengalaman belajar kata yang seru.</p>
</div>
<!-- Role Selection Container -->
<div class="w-full space-y-4">
<!-- Super Admin Card -->
<button class="role-card w-full p-6 bg-surface-container-lowest rounded-xl flex items-center gap-4 text-left hover:bg-primary-fixed group border border-outline-variant/30" onclick="selectRole('Super Admin')">
<div class="h-16 w-16 rounded-full bg-tertiary-fixed flex items-center justify-center group-hover:bg-tertiary-container group-hover:text-white transition-colors">
<span class="material-symbols-outlined text-3xl" data-icon="shield_person">shield_person</span>
</div>
<div class="flex-1">
<h3 class="font-label-bold text-label-bold text-on-surface group-hover:text-primary">Super Admin</h3>
<p class="font-label-sm text-label-sm text-on-surface-variant group-hover:text-on-primary-fixed-variant">Akses penuh ke semua pengaturan sistem dan manajemen pengguna tingkat tinggi.</p>
</div>
<span class="material-symbols-outlined text-outline group-hover:translate-x-1 transition-transform" data-icon="chevron_right">chevron_right</span>
</button>
<!-- Admin Card -->
<button class="role-card w-full p-6 bg-surface-container-lowest rounded-xl flex items-center gap-4 text-left hover:bg-primary-fixed group border border-outline-variant/30" onclick="selectRole('Admin')">
<div class="h-16 w-16 rounded-full bg-primary-fixed flex items-center justify-center group-hover:bg-primary-container group-hover:text-white transition-colors">
<span class="material-symbols-outlined text-3xl" data-icon="manage_accounts">manage_accounts</span>
</div>
<div class="flex-1">
<h3 class="font-label-bold text-label-bold text-on-surface group-hover:text-primary">Admin</h3>
<p class="font-label-sm text-label-sm text-on-surface-variant group-hover:text-on-primary-fixed-variant">Kelola daftar kata, pantau aktivitas permainan, dan atur partisipan grup.</p>
</div>
<span class="material-symbols-outlined text-outline group-hover:translate-x-1 transition-transform" data-icon="chevron_right">chevron_right</span>
</button>
<!-- Partisipan Card -->
<button class="role-card w-full p-6 bg-surface-container-lowest rounded-xl flex items-center gap-4 text-left hover:bg-primary-fixed group border border-outline-variant/30" onclick="selectRole('Partisipan')">
<div class="h-16 w-16 rounded-full bg-secondary-fixed flex items-center justify-center group-hover:bg-secondary-container group-hover:text-on-secondary transition-colors">
<span class="material-symbols-outlined text-3xl" data-icon="sports_esports">sports_esports</span>
</div>
<div class="flex-1">
<h3 class="font-label-bold text-label-bold text-on-surface group-hover:text-primary">Partisipan</h3>
<p class="font-label-sm text-label-sm text-on-surface-variant group-hover:text-on-primary-fixed-variant">Bergabung dalam permainan, pecahkan teka-teki, dan kumpulkan skor tertinggi.</p>
</div>
<span class="material-symbols-outlined text-outline group-hover:translate-x-1 transition-transform" data-icon="chevron_right">chevron_right</span>
</button>
</div>
<!-- Visual Polish: Decorative Element -->
<div class="mt-12 opacity-30 pointer-events-none">
<div class="flex gap-tile-gap">
<div class="w-10 h-10 bg-primary rounded-lg flex items-center justify-center text-white font-tile-text text-tile-text">W</div>
<div class="w-10 h-10 bg-secondary-container rounded-lg flex items-center justify-center text-on-secondary-container font-tile-text text-tile-text">O</div>
<div class="w-10 h-10 bg-tertiary-container rounded-lg flex items-center justify-center text-white font-tile-text text-tile-text">R</div>
<div class="w-10 h-10 bg-primary-container rounded-lg flex items-center justify-center text-white font-tile-text text-tile-text">D</div>
</div>
</div>
</main>
<!-- Bottom NavBar (from JSON) -->
<nav class="fixed bottom-0 w-full z-50 max-w-[480px] left-1/2 -translate-x-1/2 rounded-t-xl bg-surface-container-lowest border-t border-surface-variant shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.1)]">
<div class="flex justify-around items-center h-16 w-full px-8">
<a class="flex flex-col items-center justify-center text-on-surface-variant px-6 py-1 hover:bg-surface-container-high transition-colors" href="#">
<span class="material-symbols-outlined" data-icon="videogame_asset">videogame_asset</span>
<span class="font-label-sm text-label-sm">Play</span>
</a>
<a class="flex flex-col items-center justify-center bg-primary-container text-on-primary-container rounded-full px-6 py-1" href="#">
<span class="material-symbols-outlined" data-icon="settings">settings</span>
<span class="font-label-sm text-label-sm">Admin</span>
</a>
</div>
</nav>
<!-- Modal Mockup -->
<div class="fixed inset-0 z-[100] flex items-center justify-center p-6 hidden" id="selectionModal">
<div class="absolute inset-0 bg-on-background/40 backdrop-blur-sm" onclick="closeModal()"></div>
<div class="relative bg-surface rounded-3xl p-8 w-full max-w-xs text-center shadow-2xl primary-glow">
<span class="material-symbols-outlined text-primary text-6xl mb-4" data-icon="check_circle">check_circle</span>
<h4 class="font-headline-lg-mobile text-headline-lg-mobile mb-2" id="modalRoleTitle">Role Selected</h4>
<p class="font-body-md text-body-md text-on-surface-variant mb-6">Mengarahkan Anda ke dasbor peran...</p>
<button class="w-full py-3 bg-primary text-white font-label-bold rounded-full active:scale-95 transition-transform" onclick="closeModal()">Siap!</button>
</div>
</div>
<script>
        function selectRole(role) {
            const modal = document.getElementById('selectionModal');
            const title = document.getElementById('modalRoleTitle');
            title.textContent = role;
            modal.classList.remove('hidden');
            modal.classList.add('flex');
            
            // Haptic feedback simulation
            if (window.navigator && window.navigator.vibrate) {
                window.navigator.vibrate(20);
            }
        }

        function closeModal() {
            const modal = document.getElementById('selectionModal');
            modal.classList.add('hidden');
            modal.classList.remove('flex');
        }
    </script>
</body></html>
