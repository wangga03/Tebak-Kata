<!-- Scripts for Atmosphere -->
<script>
        // Confetti Generator
        function createConfetti() {
            const container = document.getElementById('confetti-container');
            const colors = ['#7c3aed', '#fed01b', '#bf2076', '#2e7d32'];
            const shapes = ['rect', 'triangle', 'circle'];

            for (let i = 0; i < 40; i++) {
                const confetti = document.createElement('div');
                const color = colors[Math.floor(Math.random() * colors.length)];
                const size = Math.random() * 10 + 5;
                const shape = shapes[Math.floor(Math.random() * shapes.length)];
                
                confetti.style.position = 'absolute';
                confetti.style.width = `${size}px`;
                confetti.style.height = `${size}px`;
                confetti.style.backgroundColor = color;
                confetti.style.left = `${Math.random() * 100}%`;
                confetti.style.top = `-20px`;
                confetti.style.opacity = Math.random();
                confetti.style.transform = `rotate(${Math.random() * 360}deg)`;

                if (shape === 'triangle') confetti.style.clipPath = 'polygon(50% 0%, 0% 100%, 100% 100%)';
                if (shape === 'circle') confetti.style.borderRadius = '50%';

                container.appendChild(confetti);

                // Animate
                const duration = Math.random() * 3 + 2;
                confetti.animate([
                    { transform: `translateY(0) rotate(0deg)`, opacity: 1 },
                    { transform: `translateY(500px) rotate(${Math.random() * 720}deg)`, opacity: 0 }
                ], {
                    duration: duration * 1000,
                    easing: 'cubic-bezier(.37,0,.63,1)',
                    iterations: Infinity,
                    delay: Math.random() * 2000
                });
            }
        }

        function nextLevel() {
            const overlay = document.getElementById('feedback-overlay');
            overlay.style.opacity = '0';
            overlay.style.pointerEvents = 'none';
            setTimeout(() => {
                // In a real app, logic to load next level would go here
                alert('Memuat Level Selanjutnya...');
                overlay.style.opacity = '1';
                overlay.style.pointerEvents = 'auto';
            }, 600);
        }

        // Initialize effects
        window.onload = createConfetti;
    </script>
