<!DOCTYPE html>

<html lang="id"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>WordFlow - Papan Skor</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>

            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 48;
            vertical-align: middle;

        .medal-fill {

        }
        .squishy-active:active {
            transform: scale(0.95);
            transition: transform 0.15s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        body {
            -webkit-tap-highlight-color: transparent;
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                      "on-secondary-fixed": "#231b00",
                      "on-secondary": "#ffffff",
                      "on-background": "#191c1e",
                      "surface-container-lowest": "#ffffff",
                      "secondary-container": "#fed01b",
                      "primary-container": "#7c3aed",
                      "surface-bright": "#f7f9fb",
                      "primary-fixed": "#eaddff",
                      "tertiary-container": "#bf2076",
                      "surface": "#f7f9fb",
                      "error-container": "#ffdad6",
                      "outline": "#7b7487",
                      "on-primary-container": "#ede0ff",
                      "tertiary-fixed-dim": "#ffb0cd",
                      "surface-container-highest": "#e0e3e5",
                      "on-tertiary-fixed": "#3e0022",
                      "on-tertiary-fixed-variant": "#8c0053",
                      "on-tertiary": "#ffffff",
                      "on-secondary-container": "#6f5900",
                      "on-primary-fixed": "#25005a",
                      "primary": "#630ed4",
                      "inverse-primary": "#d2bbff",
                      "surface-variant": "#e0e3e5",
                      "inverse-surface": "#2d3133",
                      "surface-container-low": "#f2f4f6",
                      "background": "#f7f9fb",
                      "on-tertiary-container": "#ffdde7",
                      "on-primary-fixed-variant": "#5a00c6",
                      "surface-tint": "#732ee4",
                      "on-surface": "#191c1e",
                      "secondary": "#735c00",
                      "tertiary": "#9b005c",
                      "surface-container-high": "#e6e8ea",
                      "outline-variant": "#ccc3d8",
                      "error": "#ba1a1a",
                      "surface-dim": "#d8dadc",
                      "surface-container": "#eceef0",
                      "primary-fixed-dim": "#d2bbff",
                      "tertiary-fixed": "#ffd9e4",
                      "on-secondary-fixed-variant": "#574500",
                      "inverse-on-surface": "#eff1f3",
                      "on-error": "#ffffff",
                      "secondary-fixed": "#ffe083",
                      "on-surface-variant": "#4a4455",
                      "on-error-container": "#93000a",
                      "secondary-fixed-dim": "#eec200",
                      "on-primary": "#ffffff"
              },
              "borderRadius": {
                      "DEFAULT": "0.25rem",
                      "lg": "0.5rem",
                      "xl": "0.75rem",
                      "full": "9999px"
              },
              "spacing": {
                      "margin-mobile": "16px",
                      "gutter": "12px",
                      "tile-gap": "8px",
                      "margin-desktop": "32px",
                      "base-unit": "4px"
              },
              "fontFamily": {
                      "headline-xl": ["Plus Jakarta Sans"],
                      "label-sm": ["Plus Jakarta Sans"],
                      "label-bold": ["Plus Jakarta Sans"],
                      "headline-lg-mobile": ["Plus Jakarta Sans"],
                      "body-md": ["Plus Jakarta Sans"],
                      "tile-text": ["Plus Jakarta Sans"],
                      "headline-lg": ["Plus Jakarta Sans"]
              },
              "fontSize": {
                      "headline-xl": ["40px", {"lineHeight": "48px", "letterSpacing": "-0.02em", "fontWeight": "800"}],
                      "label-sm": ["12px", {"lineHeight": "16px", "fontWeight": "600"}],
                      "label-bold": ["14px", {"lineHeight": "20px", "fontWeight": "700"}],
                      "headline-lg-mobile": ["28px", {"lineHeight": "34px", "fontWeight": "800"}],
                      "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "500"}],
                      "tile-text": ["24px", {"lineHeight": "32px", "fontWeight": "700"}],
                      "headline-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "800"}]
              }
            },
          },
        }

<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background font-body-md min-h-screen pb-24">
<!-- TopAppBar -->
<header class="w-full top-0 sticky z-50 bg-surface dark:bg-background">
<div class="flex items-center justify-between px-margin-mobile md:px-margin-desktop py-4 max-w-[480px] mx-auto w-full">
<button onclick="window.history.back()" class="hover:opacity-80 transition-opacity flex items-center justify-center p-2 rounded-full Active: scale-95 transition-transform duration-150">
<span class="material-symbols-outlined text-primary dark:text-primary-fixed-dim">arrow_back</span>
</button>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile font-extrabold text-primary dark:text-primary-fixed-dim tracking-tight">WordFlow</h1>
<div class="w-10 h-10 rounded-full border-2 border-primary-container overflow-hidden Active: scale-95 transition-transform duration-150 cursor-pointer">
<img class="w-full h-full object-cover" data-alt="A vibrant, stylized 3D character avatar of a young gamer with purple headphones and a cheerful expression. The avatar is set against a clean, light-mode background with soft global lighting, fitting the modern and playful WordFlow design system. High-quality digital render with purple and yellow accents." src="https://lh3.googleusercontent.com/aida-public/AB6AXuBLcPb0A6N5hwgpH_Jv_pPyQ7W_LPjNi85wi-b9Mc2Eq1AZo13U7xr6XsCsgWVLAzIa7HQZu03GoTMLIggKt3Tt413tk8Dwy9-ucavGPZRulOBh6aRWJFckZGEXEIcvlQ2JHorg1rjBYW-p8svfXYLAhfFDE-l6bTAqXFansfCW6vX_VIeiFJZaq1bAvFcyGUV37jDEbn3YkeaCM8w0ogjXXYclm6qs3yLAHEQP8KFocMzjbF_VNyk"/>
</div>
</div>
</header>
<main class="max-w-[480px] mx-auto px-margin-mobile pt-4">
<!-- Podium Section -->
<section class="mt-4 mb-8">
<h2 class="font-headline-lg-mobile text-headline-lg-mobile text-center text-on-surface mb-8">Papan Skor</h2>
<div class="flex items-end justify-center gap-4 h-64" id="podium-container">
    <div class="w-full text-center text-on-surface-variant font-label-bold animate-pulse">Memuat Papan Skor...</div>
</div>
</section>
<!-- Full Ranking List -->
<section class="space-y-3 mb-12" id="leaderboard-list">
</section>
<!-- Load More -->
<button class="w-full py-4 text-primary font-label-bold flex items-center justify-center gap-2 hover:bg-surface-container rounded-xl transition-colors">
                Lihat Selengkapnya
                <span class="material-symbols-outlined">expand_more</span>
</button>
</section>
</main>

<script>
        document.addEventListener('DOMContentLoaded', async () => {
            try {
                const res = await fetch('/api/get-leaderboard');
                const players = await res.json();
                const currentUsername = localStorage.getItem('username');

                const podiumContainer = document.getElementById('podium-container');
                const listContainer = document.getElementById('leaderboard-list');
                
                podiumContainer.innerHTML = '';
                listContainer.innerHTML = '';

                if (players.length === 0) {
                    podiumContainer.innerHTML = '<div class="w-full text-center text-on-surface-variant">Belum ada peserta</div>';
                    return;
                }

                // Render Rank 2
                if (players[1]) {
                    podiumContainer.innerHTML += `
                    <div class="flex flex-col items-center w-24">
                    <div class="relative mb-2">
                    <div class="w-16 h-16 rounded-full border-4 border-surface-container-highest flex items-center justify-center font-bold text-xl bg-surface shadow-md">
                    ${players[1].username.substring(0,2).toUpperCase()}
                    </div>
                    <div class="absolute -bottom-1 -right-1 bg-surface-container-highest text-on-surface-variant w-6 h-6 rounded-full flex items-center justify-center text-xs font-bold border-2 border-white">2</div>
                    </div>
                    <div class="bg-surface-container-low w-full h-24 rounded-t-xl flex flex-col items-center justify-start pt-2 shadow-sm border-x border-t border-outline-variant">
                    <span class="font-label-bold text-label-bold truncate w-full text-center px-1">${players[1].username}</span>
                    <span class="text-primary font-bold text-sm">${players[1].score.toLocaleString()}</span>
                    </div>
                    </div>`;
                }

                // Render Rank 1
                if (players[0]) {
                    podiumContainer.innerHTML += `
                    <div class="flex flex-col items-center w-32 scale-110 -translate-y-2">
                    <div class="relative mb-3">
                    <span class="material-symbols-outlined text-secondary text-4xl absolute -top-8 left-1/2 -translate-x-1/2 medal-fill" style="font-variation-settings: 'FILL' 1;">workspace_premium</span>
                    <div class="w-20 h-20 rounded-full border-4 border-secondary-container flex items-center justify-center font-extrabold text-2xl bg-white shadow-xl">
                    ${players[0].username.substring(0,2).toUpperCase()}
                    </div>
                    <div class="absolute -bottom-1 -right-1 bg-secondary-container text-on-secondary-container w-8 h-8 rounded-full flex items-center justify-center text-sm font-bold border-2 border-white">1</div>
                    </div>
                    <div class="bg-primary-container w-full h-32 rounded-t-2xl flex flex-col items-center justify-start pt-4 shadow-lg">
                    <span class="font-label-bold text-label-bold text-white truncate w-full text-center px-1">${players[0].username}</span>
                    <span class="text-secondary-container font-extrabold text-lg">${players[0].score.toLocaleString()}</span>
                    </div>
                    </div>`;
                }

                // Render Rank 3
                if (players[2]) {
                    podiumContainer.innerHTML += `
                    <div class="flex flex-col items-center w-24">
                    <div class="relative mb-2">
                    <div class="w-16 h-16 rounded-full border-4 border-tertiary-fixed flex items-center justify-center font-bold text-xl bg-surface shadow-md">
                    ${players[2].username.substring(0,2).toUpperCase()}
                    </div>
                    <div class="absolute -bottom-1 -right-1 bg-tertiary-fixed text-on-tertiary-fixed w-6 h-6 rounded-full flex items-center justify-center text-xs font-bold border-2 border-white">3</div>
                    </div>
                    <div class="bg-surface-container-low w-full h-16 rounded-t-xl flex flex-col items-center justify-start pt-2 shadow-sm border-x border-t border-outline-variant">
                    <span class="font-label-bold text-label-bold truncate w-full text-center px-1">${players[2].username}</span>
                    <span class="text-primary font-bold text-sm">${players[2].score.toLocaleString()}</span>
                    </div>
                    </div>`;
                }

                // Render rest of the list
                for (let i = 3; i < players.length; i++) {
                    const p = players[i];
                    const isMe = p.username === currentUsername;
                    
                    if (isMe) {
                        listContainer.innerHTML += `
                        <div class="flex items-center bg-primary-container p-3 rounded-xl border-2 border-primary shadow-md transform scale-[1.02]">
                        <span class="w-8 font-label-bold text-on-primary-container">${i + 1}</span>
                        <div class="w-10 h-10 rounded-full border-2 border-white bg-surface flex items-center justify-center font-bold text-primary">
                        ${p.username.substring(0,2).toUpperCase()}
                        </div>
                        <div class="ml-3 flex-grow">
                        <div class="flex items-center gap-2">
                        <p class="font-label-bold text-white">${p.username}</p>
                        <span class="bg-secondary-container text-on-secondary-container text-[8px] font-extrabold px-1.5 py-0.5 rounded-full uppercase">Saya</span>
                        </div>
                        </div>
                        <div class="text-right">
                        <p class="font-bold text-white">${p.score.toLocaleString()}</p>
                        </div>
                        </div>`;
                    } else {
                        listContainer.innerHTML += `
                        <div class="flex items-center bg-surface-container-lowest p-3 rounded-xl border border-outline-variant shadow-sm hover:translate-y-[-2px] transition-transform">
                        <span class="w-8 font-label-bold text-on-surface-variant">${i + 1}</span>
                        <div class="w-10 h-10 rounded-full bg-surface-container flex items-center justify-center font-bold text-primary">
                        ${p.username.substring(0,2).toUpperCase()}
                        </div>
                        <div class="ml-3 flex-grow">
                        <p class="font-label-bold text-on-surface">${p.username}</p>
                        </div>
                        <div class="text-right">
                        <p class="font-bold text-primary">${p.score.toLocaleString()}</p>
                        </div>
                        </div>`;
                    }
                }

            } catch (err) {
                console.error('Failed to load leaderboard', err);
            }
        });
    </script>
</body></html>
