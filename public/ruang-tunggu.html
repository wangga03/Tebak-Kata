<style>

<script>
        // Micro-interaction for tiles rotation on mouse/touch movement
        document.addEventListener('mousemove', (e) => {
            const centerX = window.innerWidth / 2;
            const centerY = window.innerHeight / 2;
            const moveX = (e.clientX - centerX) / 100;
            const moveY = (e.clientY - centerY) / 100;
            
            const tiles = document.querySelectorAll('.tile-shadow');
            tiles.forEach((tile, index) => {
                const factor = (index + 1) * 0.5;
                tile.style.transform = `translate(${moveX * factor}px, ${moveY * factor}px) rotate(${moveX * 2}deg)`;
            });
        });

        // Simple exit button handler
        document.querySelector('.bg-error-container').addEventListener('click', () => {
            if(confirm('Yakin ingin keluar dari ruang tunggu?')) {
                console.log('User exited');
            }
        });
    </script>
    <script>
        const currentUsername = localStorage.getItem('username');
        if (currentUsername) {
            document.getElementById('current-username').innerText = currentUsername;
            document.querySelector('.w-12.h-12.rounded-full').innerText = currentUsername.substring(0, 2).toUpperCase();
        } else {
            window.location.href = 'username.html';
        }

        async function syncParticipants() {
            try {
                const res = await fetch('/api/participants');
                const participants = await res.json();
                
                const othersList = document.getElementById('others-list');
                const othersCount = document.getElementById('others-count');
                othersList.innerHTML = '';
                
                const now = new Date();
                let count = 0;

                participants.forEach(p => {
                    if (p.username === currentUsername) return; // Skip self

                    let dateStr = p.last_active;
                    if (!dateStr.endsWith('Z')) dateStr += 'Z';
                    const diffMins = Math.floor((now - new Date(dateStr)) / 60000);
                    
                    if (diffMins < 15) {
                        count++;
                        othersList.innerHTML += `
                        <div class="px-4 py-2 bg-surface-container-highest rounded-full border border-surface-variant flex items-center gap-2">
                            <div class="w-6 h-6 rounded-full bg-secondary-container flex items-center justify-center text-[10px] font-bold">${p.username.substring(0,2).toUpperCase()}</div>
                            <span class="font-label-bold text-label-bold">${p.username}</span>
                        </div>`;
                    }
                });
                
                othersCount.innerText = `Pemain Lainnya (${count})`;
            } catch (e) {
                console.error(e);
            }
        }

        function keluarGame() {
            if(currentUsername) {
                const blob = new Blob([JSON.stringify({ username: currentUsername })], { type: 'application/json' });
                navigator.sendBeacon('/api/participants?action=remove', blob);
                localStorage.removeItem('username');
            }
            window.location.href = 'username.html';
        }

        // Check if game started
        setInterval(async () => {
            try {
                const res = await fetch('/api/game-pass');
                const data = await res.json();
                if (data.is_game_started) {
                    window.location.href = 'game.html';
                }
            } catch (e) {
                console.error(e);
            }
        }, 3000);
        
        syncParticipants();
        setInterval(syncParticipants, 3000);
    </script>
