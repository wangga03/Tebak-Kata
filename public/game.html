<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
    <title>WordFlow - Tebak Kata</title>
    <link rel="stylesheet" href="css/style.css"/>
</head>
<body>
    <!-- Top AppBar -->
    <header class="app-bar">
        <div class="app-bar-content container">
            <div class="d-flex align-items-center gap-2">
                <button class="icon-button" onclick="window.location.href='index.html'">
                    <span class="material-symbols-outlined text-primary">arrow_back</span>
                </button>
                <h1 class="headline-lg-mobile text-primary">WordFlow</h1>
            </div>
            <button class="icon-button">
                <span class="material-symbols-outlined text-primary">account_circle</span>
            </button>
        </div>
    </header>

    <main class="container d-flex flex-column align-items-center pt-24 pb-32 w-100">
        <!-- Category Badge & Question Card -->
        <section class="mb-8 w-100">
            <div class="question-card">
                <div class="badge-level">
                    <span class="material-symbols-outlined" style="font-size: 18px;">quiz</span>
                    <span id="game-level">Level 1</span>
                </div>
                <h2 class="label-bold text-on-surface-variant uppercase tracking-widest mb-2" style="font-size: 11px;">Pertanyaan</h2>
                <p id="game-question" class="headline-lg-mobile text-on-surface">Loading...</p>
            </div>
        </section>

        <!-- Answer Slots -->
        <section class="d-flex justify-content-center gap-2 mb-12" id="answer-grid" style="flex-wrap: wrap;">
            <!-- Rendered by JS -->
        </section>

        <!-- Letter Pool -->
        <section class="mb-10 w-100">
            <h3 class="label-bold text-on-surface-variant text-center mb-4 uppercase tracking-widest text-sm">Pilih Huruf</h3>
            <div class="letter-pool" id="letter-pool">
                <!-- Rendered by JS -->
            </div>
        </section>

        <!-- Check Answer Button -->
        <section class="w-100 px-4">
            <button id="btn-check" class="btn-primary w-100 uppercase tracking-wide">
                Cek Jawaban
            </button>
        </section>

        <p class="text-center mt-6 text-on-surface-variant label-sm" style="opacity: 0.6;">Tekan huruf untuk memasukkan kata</p>
    </main>

    <!-- BottomNavBar -->
    <nav class="bottom-nav">
        <div class="bottom-nav-content">
            <a class="nav-item active" href="game.html">
                <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">videogame_asset</span>
                <span class="label-sm">Play</span>
            </a>
            <a class="nav-item" href="index.html">
                <span class="material-symbols-outlined">settings</span>
                <span class="label-sm">Admin</span>
            </a>
        </div>
    </nav>

    <script src="js/db.js"></script>
    <script src="js/app.js"></script>
    <script>
        let currentQuestion = null;
        let currentSlotIndex = 0;

        function shuffle(array) {
            return array.sort(() => Math.random() - 0.5);
        }

        function generateRandomLetters(count) {
            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
            let result = '';
            for (let i = 0; i < count; i++) {
                result += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            return result;
        }

        async function loadRandomQuestion() {
            document.getElementById('game-question').innerText = "Loading...";
            const questions = await getQuestions();
            if (questions.length === 0) {
                document.getElementById('game-question').innerText = "Belum ada soal tersedia.";
                return;
            }

            // Pick random
            currentQuestion = questions[Math.floor(Math.random() * questions.length)];
            
            document.getElementById('game-level').innerText = currentQuestion.levelText;
            document.getElementById('game-question').innerText = currentQuestion.question;

            // Render Slots
            const answerGrid = document.getElementById('answer-grid');
            answerGrid.innerHTML = '';
            for (let i = 0; i < currentQuestion.answer.length; i++) {
                const slot = document.createElement('div');
                slot.className = 'answer-slot empty-slot';
                slot.dataset.index = i;
                answerGrid.appendChild(slot);
            }

            // Render Pool
            const letterPool = document.getElementById('letter-pool');
            letterPool.innerHTML = '';
            let poolChars = currentQuestion.answer.split('');
            const extraCount = Math.max(0, 10 - poolChars.length);
            poolChars = poolChars.concat(generateRandomLetters(extraCount).split(''));
            poolChars = shuffle(poolChars);

            poolChars.forEach((char, index) => {
                const btn = document.createElement('button');
                btn.className = 'tile-press';
                btn.innerText = char;
                btn.dataset.poolIndex = index;
                letterPool.appendChild(btn);
            });

            currentSlotIndex = 0;
            attachGameEvents();
        }

        function attachGameEvents() {
            const letters = document.querySelectorAll('#letter-pool button');
            const slots = document.querySelectorAll('#answer-grid div');

            letters.forEach(btn => {
                btn.addEventListener('click', () => {
                    // Find first empty slot
                    let firstEmpty = -1;
                    for (let i = 0; i < slots.length; i++) {
                        if (slots[i].classList.contains('empty-slot')) {
                            firstEmpty = i;
                            break;
                        }
                    }

                    if (firstEmpty !== -1) {
                        const letter = btn.innerText;
                        slots[firstEmpty].innerText = letter;
                        slots[firstEmpty].classList.remove('empty-slot');
                        slots[firstEmpty].classList.add('filled-slot');
                        slots[firstEmpty].dataset.sourceId = btn.dataset.poolIndex;
                        
                        btn.style.opacity = '0.3';
                        btn.style.pointerEvents = 'none';
                    }
                });
            });

            slots.forEach(slot => {
                slot.addEventListener('click', () => {
                    if (slot.innerText !== "") {
                        const sourceId = slot.dataset.sourceId;
                        letters.forEach(btn => {
                            if (btn.dataset.poolIndex === sourceId) {
                                btn.style.opacity = '1';
                                btn.style.pointerEvents = 'auto';
                            }
                        });
                        
                        slot.innerText = "";
                        slot.classList.remove('filled-slot');
                        slot.classList.add('empty-slot');
                        delete slot.dataset.sourceId;
                    }
                });
            });
        }

        document.getElementById('btn-check').addEventListener('click', () => {
            if (!currentQuestion) return;
            
            const slots = document.querySelectorAll('#answer-grid div');
            let answer = '';
            slots.forEach(slot => answer += slot.innerText);

            if (answer.length < currentQuestion.answer.length) {
                alert('Silakan isi semua kotak!');
                return;
            }

            if (answer === currentQuestion.answer) {
                alert('Tebakan Anda Benar! 🎉');
                loadRandomQuestion();
            } else {
                alert('Salah! Coba lagi.');
            }
        });

        document.addEventListener('DOMContentLoaded', () => {
            loadRandomQuestion();
        });
    </script>
</body>
</html>
