<style>
        .material-symbols-outlined {

            animation: bounce 2s infinite ease-in-out;

            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .floating {
            animation: float 3s infinite ease-in-out;
        }

        @keyframes float {
            0% { transform: translate(0, 0) rotate(0deg); }

            100% { transform: translate(0, 0) rotate(0deg); }

<body class="bg-surface font-body-md text-on-surface overflow-x-hidden">

<div class="flex justify-between items-center px-margin-mobile h-16 max-w-[480px] mx-auto">
<button class="text-primary hover:opacity-80 transition-opacity active:scale-95 duration-100 transition-transform">
<span class="material-symbols-outlined" data-icon="grid_view">grid_view</span>

<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-primary tracking-tight">WordFlow</h1>
<div class="w-10 h-10 rounded-full overflow-hidden border-2 border-primary-fixed">
<img class="w-full h-full object-cover" data-alt="A professional and friendly user profile avatar for a word game application. The avatar features a stylized, minimalist character with a warm smile, set against a vibrant purple background that matches the WordFlow brand identity. The illustration is clean and modern, using soft gradients and friendly geometric shapes." src="https://lh3.googleusercontent.com/aida-public/AB6AXuCgROuVFdciaMZt22HW_jg81sRE366XPnRSYVTeW88cxCjjQ7xN_lnYGQWd5lyLN82Udblj06Z93xLhaAespb24cwVgx0uGp3BZwl3JZ1d2oCkDzLgJS_9BILuXjXQErghxbtCJV6WbMm-bquKjC75GE9XwP3oLgy0fIDQg2nJXSm6BS-PBfhg1q4OtFTy162BJp39aKrzJ0nLBRFs2OjpFWmViZjnv7Jxvx3q0kyEzRJdp6cFRwqc"/>
</div>
</div>
</nav>
<!-- Main Content Container -->
<main class="max-w-[480px] mx-auto px-margin-mobile pt-8 pb-32 min-h-[calc(100vh-64px)] relative flex flex-col items-center">
<!-- Decorative Floating Tiles -->
<div class="absolute top-10 left-4 floating opacity-20 pointer-events-none">
<div class="w-12 h-12 bg-secondary-fixed rounded-xl flex items-center justify-center border-b-[3px] border-secondary font-tile-text text-tile-text text-secondary">A</div>
</div>
<div class="absolute top-24 right-6 floating opacity-20 pointer-events-none" style="animation-delay: -1.5s">
<div class="w-14 h-14 bg-primary-fixed rounded-xl flex items-center justify-center border-b-[3px] border-primary font-tile-text text-tile-text text-primary">W</div>
</div>
<div class="absolute bottom-40 left-8 floating opacity-20 pointer-events-none" style="animation-delay: -0.7s">
<div class="w-10 h-10 bg-tertiary-fixed rounded-xl flex items-center justify-center border-b-[3px] border-tertiary font-tile-text text-tile-text text-tertiary">O</div>
</div>
<!-- Greeting Section -->
<header class="text-center mb-10 w-full animate-in fade-in slide-in-from-bottom-4 duration-700">
<div class="inline-block p-4 bg-secondary-container rounded-full mb-6 tile-bounce">
<span class="material-symbols-outlined text-on-secondary-container text-5xl" style="font-variation-settings: 'FILL' 1;">celebration</span>
</div>
<h2 class="font-headline-lg text-headline-lg text-on-background mb-2">Siap Bermain?</h2>
<p class="text-on-surface-variant font-body-md px-4">Masukkan namamu untuk memulai tantangan kata.</p>
</header>
<!-- Input Section Card -->
<section class="w-full bg-surface-container-lowest rounded-[32px] p-8 shadow-sm border border-outline-variant/30 animate-in fade-in slide-in-from-bottom-8 duration-700 delay-150">
<div class="space-y-6">
<!-- Username Input -->
<div class="space-y-2">
<label class="font-label-bold text-label-bold text-on-surface-variant ml-1" for="username">Nama Pemain</label>
<div class="relative flex items-center group input-glow rounded-xl transition-all duration-300">
<div class="absolute left-4 text-primary">
<span class="material-symbols-outlined" data-icon="person">person</span>
</div>
<input class="w-full bg-surface-container-low border-none rounded-xl py-4 pl-12 pr-4 font-body-md text-on-surface focus:ring-0 placeholder:text-outline" id="username" placeholder="Contoh: KataMaster" type="text"/>
</div>
</div>
<!-- Action Button -->
<button onclick="localStorage.setItem('username', document.getElementById('username').value || 'Pemain'); window.location.href='game.html'" class="w-full bg-primary text-on-primary py-5 rounded-2xl font-headline-lg-mobile text-xl shadow-lg shadow-primary/20 btn-press transition-all duration-200 flex items-center justify-center gap-3">
<span>Mulai Main</span>
<span class="material-symbols-outlined" data-icon="play_arrow" style="font-variation-settings: 'FILL' 1;">play_arrow</span>
</button>
</div>
<!-- Fun Tip -->
<div class="mt-8 flex items-start gap-3 bg-secondary-fixed/30 p-4 rounded-2xl border border-secondary-fixed/50">

<span class="material-symbols-outlined" data-icon="play_circle" style="font-variation-settings: 'FILL' 1;">play_circle</span>
<span class="font-label-sm text-label-sm">Play</span>

<span class="material-symbols-outlined" data-icon="rate_review">rate_review</span>
<span class="font-label-sm text-label-sm">Review</span>
</a>

<span class="material-symbols-outlined" data-icon="settings_suggest">settings_suggest</span>

</a>

<span class="material-symbols-outlined" data-icon="person">person</span>
<span class="font-label-sm text-label-sm">Profile</span>
</a>

<script>
        // Micro-interaction for input focus
        const input = document.getElementById('username');
        const icon = input.previousElementSibling;
        
        input.addEventListener('focus', () => {
            icon.classList.add('scale-110');
            icon.style.transition = 'transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1)';
        });
        
        input.addEventListener('blur', () => {
            icon.classList.remove('scale-110');
        });

        // Add "active" class logic based on button interaction
        const startBtn = document.querySelector('button.bg-primary');
        startBtn.addEventListener('click', function() {
            if(input.value.trim() === '') {
                input.parentElement.classList.add('ring-2', 'ring-error');
                setTimeout(() => input.parentElement.classList.remove('ring-2', 'ring-error'), 1000);
            } else {
                this.innerHTML = `
                    <svg class="animate-spin -ml-1 mr-3 h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                    </svg>
                    <span>Memulai...</span>
                `;
                // Logic to transition to next screen would go here
            }
        });
    </script>
