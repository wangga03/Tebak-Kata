<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        
        .letter-tile {
            transition: transform 0.1s ease, box-shadow 0.1s ease;
            box-shadow: 0 4px 0 0 rgba(0,0,0,0.1);
        }
        
        .letter-tile:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 0 rgba(0,0,0,0.1);
        }

        .glass-panel {
            backdrop-filter: blur(12px);
            background: rgba(255, 255, 255, 0.8);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }

  </head>
<body class="bg-background text-on-background min-h-screen flex flex-col font-body-md overflow-x-hidden">
<!-- Background Decoration (Animated/Visual) -->
<div class="fixed inset-0 z-0 overflow-hidden pointer-events-none">
<div class="absolute -top-24 -left-24 w-96 h-96 bg-primary/10 rounded-full blur-3xl"></div>
<div class="absolute top-1/2 -right-24 w-80 h-80 bg-secondary-container/20 rounded-full blur-3xl"></div>
<div class="absolute bottom-0 left-1/4 w-64 h-64 bg-tertiary-fixed/15 rounded-full blur-2xl"></div>
</div>
<!-- Main Content Canvas -->
<main class="flex-grow flex items-center justify-center p-margin-mobile relative z-10 w-full max-w-[480px] mx-auto">
<div class="w-full space-y-8">
<!-- Branding & Welcome Section -->
<div class="text-center space-y-2">
<div class="inline-flex items-center justify-center space-x-2 mb-4">
<div class="w-12 h-12 bg-primary rounded-xl flex items-center justify-center text-on-primary shadow-lg transform rotate-3">
<span class="material-symbols-outlined text-3xl" style="font-variation-settings: 'FILL' 1;">translate</span>
</div>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile font-extrabold text-primary tracking-tight">WordFlow</h1>
</div>
<h2 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface">Welcome Back, Admin</h2>
<p class="text-on-surface-variant font-body-md">Enter your credentials to manage the flow.</p>
</div>
<!-- Login Card -->
<div class="bg-surface-container-lowest rounded-[2rem] p-8 shadow-xl border border-outline-variant/30 space-y-6">
<form class="space-y-6" id="loginForm">
<!-- Username/Email Field -->
<div class="space-y-2">
<label class="block font-label-bold text-label-bold text-on-surface-variant px-1" for="identifier">Email or Username</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors">person</span>
<input class="w-full pl-12 pr-4 py-4 bg-surface-container-low border-b-2 border-transparent focus:border-primary focus:ring-0 rounded-xl transition-all font-body-md text-on-surface placeholder:text-outline/50" id="identifier" placeholder="admin@wordflow.app" type="text"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<label class="block font-label-bold text-label-bold text-on-surface-variant px-1" for="password">Password</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors">lock</span>
<input class="w-full pl-12 pr-12 py-4 bg-surface-container-low border-b-2 border-transparent focus:border-primary focus:ring-0 rounded-xl transition-all font-body-md text-on-surface placeholder:text-outline/50" id="password" placeholder="••••••••" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-outline hover:text-primary" type="button">
<span class="material-symbols-outlined">visibility</span>
</button>
</div>
</div>
<!-- Remember & Forgot -->
<div class="flex items-center justify-between px-1">
<label class="flex items-center space-x-2 cursor-pointer group">
<input class="w-5 h-5 rounded border-outline text-primary focus:ring-primary/20" type="checkbox"/>
<span class="text-label-sm font-label-sm text-on-surface-variant group-hover:text-primary transition-colors">Remember me</span>
</label>
<a class="text-label-sm font-label-sm text-primary hover:underline decoration-2 underline-offset-4" href="#">Forgot Password?</a>
</div>
<!-- Login Button -->
<button class="w-full py-4 bg-primary text-on-primary rounded-xl font-label-bold text-body-md shadow-lg shadow-primary/20 hover:bg-primary-container active:scale-[0.98] transition-all flex items-center justify-center space-x-2" type="submit">
<span>Sign In</span>
<span class="material-symbols-outlined">arrow_forward</span>
</button>
</form>
<!-- Divider -->
<div class="flex items-center space-x-4 py-2">
<div class="flex-grow h-px bg-outline-variant/30"></div>
<span class="text-label-sm font-label-sm text-outline uppercase tracking-widest">or</span>
<div class="flex-grow h-px bg-outline-variant/30"></div>
</div>
<!-- Secondary Action: Continue as Participant -->
<button onclick="window.location.href='username.html'" class="w-full py-4 bg-secondary-container text-on-secondary-container rounded-xl font-label-bold text-body-md shadow-md hover:bg-secondary-fixed transition-all flex items-center justify-center space-x-2 border-b-4 border-secondary-fixed-dim active:border-b-0 active:translate-y-1" type="button">
<span class="material-symbols-outlined">play_circle</span>
<span>Continue as Participant</span>
</button>
</div>
<!-- Role Selector (Visual Aesthetic) -->
<div class="flex justify-center space-x-4">
<div class="flex items-center space-x-2 bg-surface-container rounded-full px-4 py-2 border border-outline-variant/20 shadow-sm">
<div class="w-2 h-2 bg-secondary-fixed-dim rounded-full animate-pulse"></div>
<span class="text-label-sm font-label-sm text-on-surface-variant">Live Game Status: 124 Active Sessions</span>
</div>
</div>
<!-- Decorative Word Tiles (Bottom) -->
<div class="flex justify-center gap-tile-gap overflow-hidden pt-4">
<div class="letter-tile w-12 h-12 bg-white rounded-lg flex items-center justify-center font-tile-text text-tile-text text-primary border border-outline-variant/50">W</div>
<div class="letter-tile w-12 h-12 bg-white rounded-lg flex items-center justify-center font-tile-text text-tile-text text-primary border border-outline-variant/50">O</div>
<div class="letter-tile w-12 h-12 bg-white rounded-lg flex items-center justify-center font-tile-text text-tile-text text-primary border border-outline-variant/50">R</div>
<div class="letter-tile w-12 h-12 bg-white rounded-lg flex items-center justify-center font-tile-text text-tile-text text-primary border border-outline-variant/50">D</div>
</div>
</div>
</main>
<!-- Footer Meta -->
<footer class="p-8 text-center relative z-10">
<p class="text-label-sm font-label-sm text-outline">
            WordFlow v2.4.0 • Secure Admin Portal
        </p>
</footer>
<!-- Simple Micro-interactions Script -->
    <script src="js/db.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            const originalContent = btn.innerHTML;
            
            const userVal = document.getElementById('username').value.trim();
            const passVal = document.getElementById('password').value.trim();
            
            // Visual feedback
            btn.innerHTML = '<span class="material-symbols-outlined animate-spin">progress_activity</span><span>Authenticating...</span>';
            btn.disabled = true;
            btn.classList.add('opacity-80');
            
            try {
                await loginAdmin(userVal, passVal);
                
                btn.innerHTML = '<span class="material-symbols-outlined">check_circle</span><span>Access Granted</span>';
                btn.classList.remove('bg-primary');
                btn.classList.add('bg-green-600');
                
                setTimeout(() => {
                    window.location.href = 'kelola_soal.html';
                }, 500);
            } catch (err) {
                alert('Gagal Login: ' + err.message);
                btn.innerHTML = originalContent;
                btn.classList.remove('opacity-80');
                btn.disabled = false;
            }
        });

        // Toggle visibility icon logic
        const togglePass = document.querySelector('button .material-symbols-outlined');
        const passInput = document.getElementById('password');
        
        document.querySelector('button[type="button"].absolute').addEventListener('click', function() {
            if (passInput.type === 'password') {
                passInput.type = 'text';
                this.innerHTML = '<span class="material-symbols-outlined">visibility_off</span>';
            } else {
                passInput.type = 'password';
                this.innerHTML = '<span class="material-symbols-outlined">visibility</span>';
            }
        });
    </script>
</body></html>
