<script>
        // Micro-interaction for confetti effect
        function createConfetti() {
            const container = document.getElementById('confetti-container');
            const colors = ['#630ed4', '#fed01b', '#bf2076', '#7c3aed', '#ffe083'];
            
            for (let i = 0; i < 40; i++) {
                const confetti = document.createElement('div');
                confetti.className = 'confetti-particle';
                
                const size = Math.random() * 8 + 4;
                const left = Math.random() * 100;
                const duration = Math.random() * 2 + 1;
                const color = colors[Math.floor(Math.random() * colors.length)];
                
                confetti.style.width = `${size}px`;
                confetti.style.height = `${size}px`;
                confetti.style.backgroundColor = color;
                confetti.style.left = `${left}%`;
                confetti.style.top = `-20px`;
                confetti.style.borderRadius = i % 2 === 0 ? '50%' : '2px';
                confetti.style.transform = `rotate(${Math.random() * 360}deg)`;
                
                container.appendChild(confetti);
                
                const animation = confetti.animate([
                    { transform: `translate(0, 0) rotate(0deg)`, opacity: 1 },
                    { transform: `translate(${(Math.random() - 0.5) * 100}px, ${200 + Math.random() * 100}px) rotate(${Math.random() * 720}deg)`, opacity: 0 }
                ], {
                    duration: duration * 1000,
                    easing: 'cubic-bezier(0.25, 0.46, 0.45, 0.94)'
                });
                
                animation.onfinish = () => confetti.remove();
            }
        }

        // Run once on load
        window.onload = () => {
            setTimeout(createConfetti, 300);
            
            // Read score from localStorage
            const finalScore = localStorage.getItem('finalScore') || '0';
            const correctCount = parseInt(localStorage.getItem('correctCount') || '0');
            const wrongCount = parseInt(localStorage.getItem('wrongCount') || '0');
            const totalCount = correctCount + wrongCount;
            const accuracyPercent = totalCount > 0 ? Math.round((correctCount / totalCount) * 100) : 0;

            document.querySelector('.score-glow').innerText = parseInt(finalScore).toLocaleString() + ' pts';
            
            // Set accuracy
            const accuracyCards = document.querySelectorAll('.font-headline-lg-mobile.text-primary');
            if (accuracyCards.length > 0) {
                accuracyCards[0].innerText = `${correctCount}/${totalCount}`;
                const accuracyLabel = accuracyCards[0].nextElementSibling;
                if (accuracyLabel) {
                    accuracyLabel.innerText = `Akurasi: ${accuracyPercent}%`;
                }
            }

            // Add click interaction for replay of confetti
            document.querySelector('.score-glow').parentElement.addEventListener('click', createConfetti);
        };
    </script>
